<!doctype html>
<html lang="en" class="light light-mode">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
    <link rel="preload" as="image" href="/logo.png" fetchpriority="high" />
    
    <!-- Primary Meta Tags -->
    <title>Bitlance - Bitcoin Freelance Marketplace</title>
    <meta name="title" content="Bitlance - Bitcoin Freelance Marketplace" />
    <meta name="description" content="The world's first truly borderless freelancer economy. Build, work, and get paid in Bitcoin without banks or delays. Join the waitlist for mainnet launch." />
    <meta name="keywords" content="bitcoin freelance, crypto freelance, pay in bitcoin, earn bitcoin, borderless work, lightning network jobs, web3 marketplace, bitlance" />
    <meta name="author" content="Bitlance" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bitlance.work/" />
    <meta property="og:title" content="Bitlance - Bitcoin Freelance Marketplace" />
    <meta property="og:description" content="The world's first truly borderless freelancer economy. Build, work, and get paid in Bitcoin without banks or delays." />
    <meta property="og:image" content="https://bitlance.work/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://bitlance.work/" />
    <meta property="twitter:title" content="Bitlance - Bitcoin Freelance Marketplace" />
    <meta property="twitter:description" content="The world's first truly borderless freelancer economy. Build, work, and get paid in Bitcoin without banks or delays." />
    <meta property="twitter:image" content="https://bitlance.work/og-image.jpg" />

    <!-- AEO (Answer Engine Optimization) & Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Bitlance",
      "url": "https://bitlance.work/",
      "description": "A Bitcoin-native freelance marketplace where freelancers and clients connect globally and settle payments in Bitcoin.",
      "publisher": {
        "@type": "Organization",
        "name": "Bitlance",
        "logo": {
          "@type": "ImageObject",
          "url": "https://bitlance.work/logo.png"
        }
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://bitlance.work/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Bitlance",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "Bitcoin-native freelance marketplace connecting global talent with crypto builders."
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Are payments made in Bitcoin?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Earnings are paid and tracked in sats."
          }
        },
        {
          "@type": "Question",
          "name": "Can I work with clients from any country?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Bitlance is designed for global hiring and Bitcoin payments."
          }
        },
        {
          "@type": "Question",
          "name": "Is Bitlance free to join?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Creating an account and applying for work is free."
          }
        }
      ]
    }
    </script>
  </head>
  <body class="bg-[#050505] text-zinc-200 min-h-screen flex flex-col antialiased selection:bg-orange-500/30 selection:text-orange-100">
    <div id="root" class="flex-grow flex flex-col items-stretch"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
